name: Release

# Triggered by the version tag that release-please creates. Builds and pushes
# the multi-arch image and the Helm chart to GHCR using the built-in token.
on:
  push:
    tags:
    - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
    -
      name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
    -
      name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: true
        repository-cache: true
    -
      name: Setup Helm
      uses: azure/setup-helm@v4
    -
      name: Resolve version
      id: version
      run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
    -
      name: Registry login (GHCR)
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
        echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
    -
      name: Push image
      env:
        RELEASE_VERSION: ${{ steps.version.outputs.value }}
      run: bazel run //image:push --config=release "--//image:version=${{ steps.version.outputs.value }}"
    -
      name: Push chart
      env:
        RELEASE_VERSION: ${{ steps.version.outputs.value }}
      run: bazel run //chart:chart.push_registry --config=release
